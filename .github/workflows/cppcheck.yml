name: cppcheck

on:
  pull_request:
    paths: ["**/*.cpp", "**/*.hpp", "**/*.h", "cmake/**", "devenv/cmake/**",
            ".github/workflows/cppcheck.yml",
            "CppCheckSuppressions.txt", "devenv/.github/workflows/cppcheck.yml",
            "devenv/scripts/run-cppcheck.sh"]
  push:
    branches: [main]
    paths: ["**/*.cpp", "**/*.hpp", "**/*.h", "cmake/**", "devenv/cmake/**",
            ".github/workflows/cppcheck.yml",
            "CppCheckSuppressions.txt", "devenv/.github/workflows/cppcheck.yml",
            "devenv/scripts/run-cppcheck.sh"]
  schedule:
    - cron: "31 4 * * 0"
  workflow_dispatch:

concurrency:
  group: cppcheck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cppcheck:
    uses: devmarkusb/devenv/.github/workflows/cppcheck.yml@main
    with:
      preset: nix-conan-clang-release
      use_nix_conan: true
      nix_packages: cmake ninja pkg-config conan python3 clang cppcheck boost
